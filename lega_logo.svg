<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Decorative diagonal lines -->
  <line x1="0" y1="0" x2="250" y2="400" stroke="url(#accentGrad)" stroke-width="1" opacity="0.15"/>
  <line x1="800" y1="0" x2="550" y2="400" stroke="url(#accentGrad)" stroke-width="1" opacity="0.15"/>

  <!-- Geometric shield shape -->
  <polygon points="400,60 520,120 520,240 400,300 280,240 280,120" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
  <polygon points="400,85 500,135 500,230 400,275 300,230 300,135" fill="url(#accentGrad)" opacity="0.08"/>

  <!-- Inner accent -->
  <polygon points="400,110 475,150 475,220 400,260 325,220 325,150" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Main Title -->
  <text x="400" y="340" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#accentGrad)" filter="url(#textShadow)" text-anchor="middle" letter-spacing="8">TITANS</text>

  <!-- Subtitle -->
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" opacity="0.6" text-anchor="middle" letter-spacing="12">LEGION OF TITANS</text>
</svg>