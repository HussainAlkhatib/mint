<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7971e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="24"/>

  <!-- Decorative lines -->
  <line x1="60" y1="200" x2="180" y2="200" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
  <line x1="620" y1="200" x2="740" y2="200" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Diamond shape (symbol of strength) -->
  <polygon points="400,80 460,160 400,240 340,160" fill="none" stroke="url(#goldGrad)" stroke-width="3" filter="url(#glow)"/>
  <polygon points="400,110 435,160 400,210 365,160" fill="url(#goldGrad)" opacity="0.2"/>

  <!-- Stars -->
  <text x="280" y="150" font-size="40" fill="url(#goldGrad)" filter="url(#glow)" text-anchor="middle">✦</text>
  <text x="520" y="150" font-size="40" fill="url(#goldGrad)" filter="url(#glow)" text-anchor="middle">✦</text>

  <!-- Main Title -->
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#goldGrad)" filter="url(#shadow)" text-anchor="middle" letter-spacing="4">لقاء الجبابرة</text>

  <!-- Subtitle -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" opacity="0.8" text-anchor="middle" letter-spacing="6">LEGION OF TITANS</text>

  <!-- Bottom accent -->
  <rect x="300" y="360" width="200" height="2" fill="url(#goldGrad)" opacity="0.7"/>
</svg>